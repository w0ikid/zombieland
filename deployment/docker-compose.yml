services:
  accounts-service:
    build:
      context: ..
      dockerfile: apps/accounts-service/Dockerfile
    container_name: yarmaq-accounts-service
    restart: unless-stopped
    volumes:
      - ../secrets:/app/secrets:ro
    extra_hosts:
      - "zitadel.localhost:172.18.0.1"
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=infra-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_SERVICE_DB=yarmaq_accounts
      - KAFKA_BROKERS=kafka:29092
      - ZITADEL_API_BACKEND=zitadel.localhost:8080
      - ZITADEL_DOMAIN_BACKEND=http://zitadel.localhost:8080
      - ZITADEL_JWKS_URL=http://zitadel.localhost:8080/oauth/v2/keys
      - ACCOUNTS_SERVICE_URL=http://yarmaq-accounts-service:8081
      - TRANSACTION_SERVICE_URL=http://yarmaq-transaction-service:8082
    networks:
      - zitadel
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.accounts.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/api/v1/accounts`)"
      - "traefik.http.services.accounts.loadbalancer.server.port=8081"
      - "traefik.http.routers.accounts.priority=300"
      - traefik.docker.network=zitadel

  transaction-service:
    build:
      context: ..
      dockerfile: apps/transaction-service/Dockerfile
    container_name: yarmaq-transaction-service
    restart: unless-stopped
    volumes:
      - ../secrets:/app/secrets:ro
    env_file:
      - ../.env
    extra_hosts:
      - "zitadel.localhost:172.18.0.1"
    environment:
      - POSTGRES_HOST=infra-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_SERVICE_DB=yarmaq_transactions
      - KAFKA_BROKERS=kafka:29092
      - ZITADEL_API_BACKEND=zitadel.localhost:8080
      - ZITADEL_DOMAIN_BACKEND=http://zitadel.localhost:8080
      - ZITADEL_JWKS_URL=http://zitadel.localhost:8080/oauth/v2/keys
      - ACCOUNTS_SERVICE_URL=http://yarmaq-accounts-service:8081
      - TRANSACTION_SERVICE_URL=http://yarmaq-transaction-service:8082
    networks:
      - zitadel
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transactions.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/api/v1/transactions`)"
      - "traefik.http.services.transactions.loadbalancer.server.port=8082"
      - "traefik.http.routers.transactions.priority=300"

  notification-service:
    build:
      context: ..
      dockerfile: apps/notification-service/Dockerfile
    container_name: yarmaq-notification-service
    restart: unless-stopped
    volumes:
      - ../secrets:/app/secrets:ro
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=infra-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_SERVICE_DB=yarmaq_notifications
      - KAFKA_BROKERS=kafka:29092
      - ZITADEL_JWKS_URL=http://${ZITADEL_DOMAIN}/oauth/v2/keys
      - ZITADEL_DOMAIN_BACKEND=http://${ZITADEL_DOMAIN}
      - ZITADEL_API_BACKEND=${ZITADEL_DOMAIN}:80
      - ACCOUNTS_SERVICE_URL=http://yarmaq-accounts-service:8081
      - TRANSACTION_SERVICE_URL=http://yarmaq-transaction-service:8082
    networks:
      - zitadel
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notifications.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/api/v1/notifications`)"
      - "traefik.http.services.notifications.loadbalancer.server.port=8083"
      - "traefik.http.routers.notifications.priority=300"
      - traefik.docker.network=zitadel

  zombie-manager:
    build:
      context: ..
      dockerfile: apps/zombie-manager/Dockerfile
    container_name: yarmaq-zombie-manager
    restart: unless-stopped
    extra_hosts:
      - "zitadel.localhost:172.18.0.1"
    volumes:
      - ../secrets:/app/secrets:ro
    env_file:
      - ../.env
    environment:
      - SERVER_PORT=8084
      - POSTGRES_HOST=infra-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_SERVICE_DB=zombie_manager
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ZITADEL_JWKS_URL=http://zitadel.localhost:8080/oauth/v2/keys
    networks:
      - zitadel
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zombies.rule=Host(`${ZITADEL_DOMAIN}`) && PathPrefix(`/api/v1/districts`)"
      - "traefik.http.services.zombies.loadbalancer.server.port=8084"
      - "traefik.http.routers.zombies.priority=300"
      - traefik.docker.network=zitadel

networks:
  zitadel:
    external: true

volumes:
  postgres_data:
